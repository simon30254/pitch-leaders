name: 每週更新 MLB 投手排行

on:
  schedule:
    - cron: '0 6 * * 1'  # 每週一 UTC 06:00（台灣時間週一下午 2:00）
  workflow_dispatch:       # 也可以手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安裝 Python 套件
        run: pip install requests

      - name: 執行資料抓取與頁面生成
        run: python scripts/fetch_and_build.py

      - name: 推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "自動更新：$(date +'%Y-%m-%d')"
          git push
